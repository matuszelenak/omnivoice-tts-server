services:
  server:
    container_name: omnivoice-tts-server
    build:
      context: server
    ports:
      - "9001:9001"
    environment:
      - NUM_WORKERS=${NUM_WORKERS:-1}
      - DEVICES=${DEVICES}
      - VOICE_SAMPLES_DIR=${VOICE_SAMPLES_DIR:-/app/voices}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${HF_HOME:-./server/models}:/cache/hf
      - ${HF_HOME:-./server/cache}:/cache/torch
      - ./server/voices:${VOICE_SAMPLES_DIR:-/app/voices}
    shm_size: "2gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./server/main.py
          target: /app/main.py
        - action: sync
          path: ./server/src
          target: /app/src
        - action: rebuild
          path: ./server/pyproject.toml

  frontend:
    build:
      context: ./frontend
      target: dev
    image: omnivoice-tts-frontend
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://server:9001}
    depends_on:
      server:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/deno.json
